        --b: #22222a;
        --t: #e8e8f0;
        --m: #72728a;
        --a: #4f8eff;
      }

      body {
        width: 100%;
        min-height: 100%;

      .hdr {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(12, 12, 16, 0.94);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--b);
        padding: 14px 18px 12px;
      }
      .hdr h1 {
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 10px;
      }
      .hdr h1 span {
        color: var(--a);
      }
      .sw {
        position: relative;
      }
      .sw svg {
        position: absolute;
        left: 11px;
        top: 50%;
        transform: translateY(-50%);
        opacity: 0.4;
        pointer-events: none;
      }
      #q {
        width: 100%;
        background: #1c1c24;
        border: 1px solid var(--b);
        border-radius: 10px;
        color: var(--t);
        font-size: 15px;
        padding: 9px 12px 9px 36px;
        outline: none;
        transition: border-color 0.18s;
      }
      #q:focus {
        border-color: #4f8eff55;
      }
      #q::placeholder {
        color: var(--m);
      }
      .tabs {
        display: flex;
        gap: 7px;
        padding: 11px 18px;
        overflow-x: auto;
        scrollbar-width: none;
      }
      .tabs::-webkit-scrollbar {
        display: none;
      }
      .tab {
        flex-shrink: 0;
        background: var(--s);
        border: 1px solid var(--b);
        border-radius: 18px;
        color: var(--m);
        font-size: 12px;
        font-weight: 500;
        padding: 5px 13px;
        cursor: pointer;
        transition: all 0.16s;
        white-space: nowrap;
      }
      .tab.on {
        background: var(--a);
        border-color: var(--a);
        color: #fff;
      }
      .lst {
        padding: 0 14px 80px;
      }
      .col-wrap {
        display: flex;
        flex-direction: column;
        gap: 9px;
      }
      .col-l,
      .col-r {
        display: flex;
        flex-direction: column;
        gap: 9px;
      }

        .lst {
          padding: 0 24px 80px;
        }

          flex-direction: row;
          align-items: flex-start;
        }
        .col-l,
        .col-r {
          flex: 1;
          min-width: 0;
        }
      }

        font-size: 10px;
        font-weight: 700;
        letter-spacing: 1.8px;
        color: var(--m);
        text-transform: uppercase;
        padding: 18px 4px 8px;
      }
      .card {
        background: var(--s);
        border: 1px solid var(--b);
        border-radius: 14px;
        overflow: hidden;
        cursor: pointer;
        transition: border-color 0.16s;
      }
      .card.open {
        border-color: #4f8eff33;
      }
      .card.highlight {
        border-color: #ffcc4466;
        box-shadow: 0 0 0 2px #ffcc4422;
      }
      .ctop {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 14px 15px;
      }
      .cleft {
        display: flex;
        align-items: center;
        gap: 11px;
        min-width: 0;
      }
      .cbadge {
        flex-shrink: 0;
        width: 38px;
        height: 38px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
      }
      .cname {
        min-width: 0;
      }
      .cen {
        font-size: 15px;
        font-weight: 600;
        letter-spacing: -0.2px;
      }
      .ckr {
        font-size: 11px;
        color: var(--m);
        margin-top: 1px;
      }
      .chev {
        flex-shrink: 0;
        color: var(--m);
        font-size: 11px;
        transition: transform 0.22s;
      }
      .card.open .chev {
        transform: rotate(180deg);
      }

        max-height: 0;
        overflow: hidden;
        transition: max-height 0.32s ease;
      }
      .card.open .cbody {
        max-height: 900px;
      }
      .cinner {
        padding: 14px 15px 16px;
        border-top: 1px solid var(--b);
      }
      .sec {
        margin-bottom: 13px;
      }
      .sec:last-child {
        margin-bottom: 0;
      }
      .slbl {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 1.5px;
        color: var(--m);
        text-transform: uppercase;
        margin-bottom: 7px;
      }

        font-size: 14px;
        line-height: 1.85;
        color: #c8c8d8;
      }

        display: flex;
        flex-direction: column;
        gap: 6px;

        align-items: flex-start;
        gap: 9px;
        font-size: 14px;
        line-height: 1.65;
        color: #c0c0d4;

        content: "·";
        color: var(--a);
        flex-shrink: 0;
        font-size: 16px;
        margin-top: -0.05em;
      }
      .empty {
        text-align: center;
        padding: 60px 20px;
        color: var(--m);

      let activeCat = "all",
        searchQ = "";
      function slug(s) {
        return s
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/(^-|-$)/g, "");
      }
      function esc(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function render() {
        const q = searchQ.trim().toLowerCase();
        const lst = document.getElementById("lst");
        let html = "",
          count = 0;
        CORDER.forEach((cat) => {
          if (activeCat !== "all" && activeCat !== cat) return;
          const items = D.filter((d) => {
            if (d.c !== cat) return false;
            if (!q) return true;
            return (
              d.e.toLowerCase().includes(q) ||
              d.k.toLowerCase().includes(q) ||
              d.d.toLowerCase().includes(q) ||
              (d.sy || []).some((s) => s.toLowerCase().includes(q))
            );
          });
          if (!items.length) return;
          count += items.length;
          const mkCard = (d) => {
            const id = slug(d.e);
            const syH =
              d.sy && d.sy.length
                ? `<div class="sec"><div class="slbl">Ce que vous observez</div><div class="slist">${d.sy.map((s) => `<div class="si">${esc(s)}</div>`).join("")}</div></div>`
                : "";
            return `<div class="card" id="${id}" onclick="tog('${id}')">
<div class="ctop">
  <div class="cleft">
    <div class="cbadge" style="background:${CBG[cat]}">${CICO[cat]}</div>
    <div class="cname"><div class="cen">${esc(d.k)}</div><div class="ckr">${esc(d.e)}</div></div>
  </div>
  <div class="chev">▼</div>
</div>
<div class="cbody">

    ${syH}
  </div>
</div>
</div>`;
          };
          const L = items
            .filter((_, i) => i % 2 === 0)
            .map(mkCard)
            .join("");
          const R = items
            .filter((_, i) => i % 2 === 1)
            .map(mkCard)
            .join("");
          html += `<div class="clbl">${CLBL[cat]}</div>`;
          html += `<div class="col-wrap"><div class="col-l">${L}</div><div class="col-r">${R}</div></div>`;
        });
        lst.innerHTML = count
          ? html
          : `<div class="empty">Aucun résultat.</div>`;

          // filter D to only those slugs
          const slugSet = new Set(ids);
          // temporary override: show only matching entries
          renderSubset(slugSet);
          setTimeout(() => {
            ids.forEach((id) => {
              const el = document.getElementById(id);
              if (el) el.classList.add("open");
            });
            const first = document.getElementById(ids[0]);
            if (first)
              first.scrollIntoView({ behavior: "smooth", block: "start" });
          }, 80);
          return;
        }

        // ?q=water+damage → auto-search
        const qParam = params.get("q");
        if (qParam) {
          document.getElementById("q").value = qParam;
          searchQ = qParam;
          render();
          return;
        }

        // #water-damage → scroll + open card (full list stays visible)
        if (location.hash) {
          const id = location.hash.slice(1);
          setTimeout(() => {
            const el = document.getElementById(id);
            if (!el) return;
            el.classList.add("open", "highlight");
            el.scrollIntoView({ behavior: "smooth", block: "center" });
            setTimeout(() => el.classList.remove("highlight"), 2500);
          }, 80);
        }
      });

      document.querySelectorAll(".tab").forEach((t) => {
        t.addEventListener("click", () => {
          document
            .querySelectorAll(".tab")
            .forEach((x) => x.classList.remove("on"));
          t.classList.add("on");
          activeCat = t.dataset.c;
          render();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
      });

      let st;
      document.getElementById("q").addEventListener("input", (e) => {
        clearTimeout(st);
        st = setTimeout(() => {
          searchQ = e.target.value;
          activeCat = "all";
          document
            .querySelectorAll(".tab")
            .forEach((t) => t.classList.remove("on"));
          document.querySelector(".tab[data-c='all']").classList.add("on");
          render();
        }, 200);
      });

      render();
    </script>
  </body>
</html>
