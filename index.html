<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>NOVA-1 PCB</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{
      width:100%;height:100%;
      background:#000;
      display:flex;align-items:center;justify-content:center;
      overflow:hidden;
      font-family:monospace;
    }
    canvas{display:block;touch-action:none;}
    #tooltip{
      position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
      background:rgba(0,20,8,0.92);
      border:1px solid rgba(0,220,100,0.3);
      color:#7effa0;
      font:11px monospace;letter-spacing:1px;
      padding:8px 18px;border-radius:20px;
      pointer-events:none;opacity:0;transition:opacity .25s;
      white-space:nowrap;
    }
    #tooltip.on{opacity:1;}
  </style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="tooltip" id="tt"></div>
<script>
const cv=document.getElementById("cv");
const ctx=cv.getContext("2d");
const tt=document.getElementById("tooltip");
let W,H,scale,ox,oy;
const BW=360,BH=660; // board logical size

function resize(){
  W=window.innerWidth; H=window.innerHeight;
  cv.width=W; cv.height=H;
  scale=Math.min(W/BW,H/BH)*.94;
  ox=(W-BW*scale)/2; oy=(H-BH*scale)/2;
}
resize();
window.addEventListener("resize",resize);

function s(x,y){return{x:ox+x*scale,y:oy+y*scale};}
function sr(x,y,w,h){
  const p=s(x,y);
  return{x:p.x,y:p.y,w:w*scale,h:h*scale};
}

/* ── COMPONENTS ── */
const CHIPS=[
  // id, label, x, y, w, h, type, desc
  {id:"SOC",    lbl:"APX-1\nSoC",       x:178,y:268, w:96,h:88, t:"cpu",  desc:"APX-1 · 3nm · 6-core CPU · 8-core GPU"},
  {id:"RAM0",   lbl:"LPDDR5X",          x:76, y:248, w:64,h:38, t:"mem",  desc:"LPDDR5X · 16GB · 6400MHz"},
  {id:"RAM1",   lbl:"LPDDR5X",          x:76, y:298, w:64,h:38, t:"mem",  desc:"LPDDR5X · 16GB · 6400MHz"},
  {id:"NAND",   lbl:"NAND\n512GB",      x:293,y:262, w:58,h:46, t:"mem",  desc:"NAND Flash · 512GB · NVMe"},
  {id:"PMIC",   lbl:"PMU",              x:52, y:46,  w:52,h:38, t:"pwr",  desc:"Power Management IC · 3.25V ACC"},
  {id:"CHG",    lbl:"Charging\nIC",     x:156,y:44,  w:56,h:38, t:"pwr",  desc:"Wireless + Wired Charging IC"},
  {id:"WLAN",   lbl:"WLAN+BT\nModule", x:267,y:38,  w:82,h:56, t:"rf",   desc:"Wi-Fi 7 · Bluetooth 5.4 · UWB"},
  {id:"BBPMU",  lbl:"BBPMU",           x:52, y:126, w:48,h:34, t:"pwr",  desc:"Baseband Power Management"},
  {id:"USB",    lbl:"USB\nCtrl",        x:158,y:124, w:50,h:34, t:"ic",   desc:"USB 3.2 · DisplayPort · MagSafe"},
  {id:"RF",     lbl:"RF\nCoupler",      x:306,y:122, w:44,h:30, t:"rf",   desc:"Wi-Fi Antenna Signal Coupler"},
  {id:"GYRO",   lbl:"Gyro",            x:52, y:50,  w:36,h:26, t:"ic",   desc:"6-axis Gyroscope + Accelerometer"},
  {id:"LOGIC",  lbl:"Logic\nEEPROM",   x:52, y:340, w:42,h:32, t:"ic",   desc:"Boot ROM · Secure Enclave Logic"},
  {id:"BB",     lbl:"Baseband",        x:60, y:406, w:72,h:54, t:"cpu",  desc:"Baseband Processor · 5G Sub-6 + mmWave"},
  {id:"PA0",    lbl:"PA",              x:50, y:482, w:36,h:26, t:"rf",   desc:"Power Amplifier · Sub-6GHz"},
  {id:"PA1",    lbl:"PA",              x:98, y:482, w:36,h:26, t:"rf",   desc:"Power Amplifier · mmWave"},
  {id:"DISP",   lbl:"Display\nIC",     x:272,y:402, w:64,h:44, t:"ic",   desc:"ProMotion Display Driver IC"},
  {id:"TOUCH",  lbl:"Touch\nCtrl",     x:166,y:420, w:52,h:36, t:"ic",   desc:"Touchscreen Controller"},
  {id:"AUDIO",  lbl:"Audio\nCodec",    x:186,y:486, w:54,h:38, t:"ic",   desc:"Hi-Fi Audio Codec · Spatial Audio"},
  {id:"NFC",    lbl:"NFC",             x:282,y:484, w:46,h:34, t:"rf",   desc:"NFC Controller · Apple Pay"},
  {id:"CAMPMIC",lbl:"Cam\nPMIC",       x:52, y:556, w:46,h:32, t:"pwr",  desc:"Camera 3.2V Power Supply"},
  {id:"FACEID", lbl:"Face ID\nPMIC",   x:146,y:556, w:54,h:32, t:"ic",   desc:"Face ID · Structured Light Sensor"},
  {id:"CAMCONN",lbl:"CAM\nConn",       x:272,y:558, w:58,h:36, t:"ic",   desc:"Rear Camera Array Connector"},
  {id:"NFC_P",  lbl:"NFC_P",           x:52, y:612, w:38,h:26, t:"rf",   desc:"NFC Passive Antenna"},
  {id:"NFC_F",  lbl:"NFC_F",           x:104,y:612, w:38,h:26, t:"rf",   desc:"NFC Field Detector"},
  {id:"SMALL1", lbl:"Small\nAudio",    x:220,y:562, w:34,h:24, t:"ic",   desc:"Secondary Speaker Amplifier"},
  {id:"ROSE",   lbl:"ROSE",            x:310,y:614, w:36,h:26, t:"ic",   desc:"Secure Element · eSIM Controller"},
];

const TYPE_COL={
  cpu:"#1a1a2e",mem:"#1a2a1a",pwr:"#2a1a10",
  rf:"#12101e",ic:"#141414",
};
const TYPE_BORDER={
  cpu:"#5566ff",mem:"#44ff88",pwr:"#ff8844",
  rf:"#cc44ff",ic:"#448888",
};

/* ── TRACES ── */
/* each trace: points[], color, animated, speed multiplier, width */
const TRACES=[
  // SOC ↔ RAM (data bus – cyan)
  {pts:[{x:178,y:268},{x:152,y:268}],             col:"#00ffcc",anim:true, sp:1.4, w:1.5},
  {pts:[{x:178,y:295},{x:152,y:295},{x:152,y:280}],col:"#00ffcc",anim:true, sp:1.2, w:1.5},
  {pts:[{x:178,y:310},{x:152,y:310},{x:152,y:317}],col:"#00ffcc",anim:true, sp:1.1, w:1.5},

  // SOC ↔ NAND (storage – cyan)
  {pts:[{x:274,y:272},{x:293,y:272}],             col:"#00ffcc",anim:true, sp:0.9, w:1.5},
  {pts:[{x:274,y:288},{x:293,y:295}],             col:"#00ffcc",anim:true, sp:0.8, w:1.5},

  // PMIC power rails (orange)
  {pts:[{x:104,y:65},{x:140,y:65},{x:140,y:110},{x:178,y:280}], col:"#ff7722",anim:false,w:2},
  {pts:[{x:104,y:65},{x:156,y:65}],               col:"#ff7722",anim:false,w:2},
  {pts:[{x:52, y:126},{x:52,y:95},{x:52,y:65}],   col:"#ff7722",anim:false,w:1.5},

  // CHG → PMIC
  {pts:[{x:156,y:63},{x:132,y:63}],               col:"#ff9944",anim:false,w:1.5},

  // WLAN → SOC (blue)
  {pts:[{x:267,y:66},{x:230,y:66},{x:230,y:180},{x:226,y:268}], col:"#4499ff",anim:true, sp:1.0, w:1.5},

  // USB → SOC
  {pts:[{x:183,y:158},{x:183,y:268}],             col:"#4499ff",anim:true, sp:0.7, w:1.5},

  // RF ← WLAN
  {pts:[{x:306,y:137},{x:306,y:94},{x:349,y:94}], col:"#cc44ff",anim:true, sp:1.5, w:1},

  // BB → SOC (baseband data)
  {pts:[{x:132,y:433},{x:132,y:380},{x:178,y:320}], col:"#4499ff",anim:true, sp:0.85, w:1.5},

  // BB → PA0/PA1
  {pts:[{x:68,y:460},{x:68,y:482}],               col:"#cc44ff",anim:true, sp:1.8, w:1},
  {pts:[{x:96,y:460},{x:116,y:482}],              col:"#cc44ff",anim:true, sp:1.6, w:1},

  // BBPMU → BB
  {pts:[{x:76,y:143},{x:76,y:406}],               col:"#ff7722",anim:false,w:1.5},

  // SOC → DISP
  {pts:[{x:226,y:356},{x:226,y:390},{x:272,y:424}],col:"#00aaff",anim:true, sp:0.9, w:1.5},

  // SOC → TOUCH
  {pts:[{x:192,y:356},{x:192,y:420}],             col:"#00aaff",anim:true, sp:0.7, w:1},

  // SOC → AUDIO
  {pts:[{x:213,y:356},{x:213,y:486}],             col:"#00ffaa",anim:true, sp:0.6, w:1},

  // SOC → NFC
  {pts:[{x:254,y:340},{x:282,y:340},{x:282,y:484}],col:"#aa44ff",anim:true, sp:0.5, w:1},

  // SOC → FACEID
  {pts:[{x:178,y:356},{x:178,y:490},{x:173,y:556}],col:"#00ffcc",anim:false,w:1},

  // SOC → LOGIC
  {pts:[{x:178,y:305},{x:130,y:305},{x:94,y:356}], col:"#44ff88",anim:false,w:1},

  // CAMPMIC ← PMIC
  {pts:[{x:52,y:556},{x:52,y:500},{x:52,y:160}],  col:"#ff7722",anim:false,w:1.5},

  // CAMCONN ← SOC
  {pts:[{x:274,y:328},{x:301,y:328},{x:301,y:558}],col:"#00ffcc",anim:false,w:1},

  // GYRO → SOC
  {pts:[{x:88,y:63},{x:130,y:63},{x:130,y:200},{x:178,y:268}], col:"#88ffcc",anim:false,w:1},

  // NFC_P / NFC_F ground loops
  {pts:[{x:52,y:625},{x:104,y:625},{x:142,y:625}],col:"#884488",anim:false,w:1},
  {pts:[{x:71,y:638},{x:71,y:648},{x:200,y:648},{x:200,y:530}], col:"#884488",anim:false,w:1},

  // ROSE ← SOC
  {pts:[{x:274,y:312},{x:328,y:312},{x:328,y:614}],col:"#ff44cc",anim:true, sp:0.4, w:1},
];

/* ── VIA HOLES ── */
const VIAS=[
  {x:130,y:200},{x:140,y:185},{x:155,y:185},{x:165,y:185},
  {x:230,y:180},{x:242,y:172},{x:210,y:172},{x:198,y:165},
  {x:130,y:380},{x:130,y:360},{x:130,y:340},
  {x:226,y:380},{x:213,y:480},{x:282,y:340},{x:301,y:340},
  {x:52,y:500},{x:52,y:460},{x:52,y:200},
  {x:173,y:490},{x:192,y:380},{x:192,y:400},
  {x:328,y:320},{x:328,y:400},{x:328,y:520},
];

/* ── PASSIVE COMPONENTS ── */
const PASSIVES=[];
(function(){
  const spots=[
    [110,200],[125,200],[140,200],[155,200],[170,200],[185,200],[200,200],[215,200],[230,200],
    [110,215],[140,215],[170,215],[200,215],[230,215],
    [110,230],[140,230],[170,230],[200,230],[230,230],
    [110,185],[125,185],[185,185],[245,185],[260,185],
    [245,200],[260,200],[245,215],[260,215],
    [110,370],[125,370],[140,370],[155,370],
    [240,370],[255,370],[270,370],
    [110,460],[140,460],[155,460],[170,460],
    [240,460],[255,460],[280,460],
    [110,530],[125,530],[140,530],[200,530],[215,530],[230,530],
  ];
  spots.forEach(([x,y])=>{
    PASSIVES.push({x,y,type:Math.random()<.6?"cap":"res"});
  });
})();

/* ── SIGNAL ANIMATION ── */
const pulses=TRACES.filter(t=>t.anim).map(t=>({
  trace:t,
  progress:Math.random(),
  totalLen:0,
  segLens:[],
}));
pulses.forEach(p=>{
  const pts=p.trace.pts;
  for(let i=1;i<pts.length;i++){
    const dx=pts[i].x-pts[i-1].x,dy=pts[i].y-pts[i-1].y;
    const l=Math.sqrt(dx*dx+dy*dy);
    p.segLens.push(l);
    p.totalLen+=l;
  }
});
function getPulsePos(p){
  const target=p.progress*p.totalLen;
  let acc=0;
  const pts=p.trace.pts;
  for(let i=0;i<p.segLens.length;i++){
    if(acc+p.segLens[i]>=target){
      const t=(target-acc)/p.segLens[i];
      return{
        x:pts[i].x+t*(pts[i+1].x-pts[i].x),
        y:pts[i].y+t*(pts[i+1].y-pts[i].y),
      };
    }
    acc+=p.segLens[i];
  }
  return pts[pts.length-1];
}

/* ── HOVER ── */
let hoveredChip=null;
function findChip(px,py){
  for(let i=CHIPS.length-1;i>=0;i--){
    const c=CHIPS[i];
    const r=sr(c.x-c.w/2,c.y-c.h/2,c.w,c.h);
    if(px>=r.x&&px<=r.x+r.w&&py>=r.y&&py<=r.y+r.h) return c;
  }
  return null;
}
cv.addEventListener("mousemove",e=>{
  hoveredChip=findChip(e.clientX,e.clientY);
  if(hoveredChip){tt.textContent=hoveredChip.desc;tt.classList.add("on");}
  else tt.classList.remove("on");
});
cv.addEventListener("touchstart",e=>{
  const t=e.touches[0];
  hoveredChip=findChip(t.clientX,t.clientY);
  if(hoveredChip){tt.textContent=hoveredChip.desc;tt.classList.add("on");}
  else tt.classList.remove("on");
},{passive:true});

/* ── DRAW ── */
let frame=0,lastT=0;

function drawBoard(){
  // board fill
  ctx.save();
  const bx=s(0,0).x,by=s(0,0).y,bw=BW*scale,bh=BH*scale,br=14*scale;
  ctx.beginPath();
  ctx.roundRect(bx,by,bw,bh,br);
  ctx.fillStyle="#0b1f0e";
  ctx.fill();

  // substrate texture (subtle grid)
  ctx.strokeStyle="rgba(0,80,30,0.18)";ctx.lineWidth=.5;
  const step=14*scale;
  for(let x=bx;x<bx+bw;x+=step){ctx.beginPath();ctx.moveTo(x,by);ctx.lineTo(x,by+bh);ctx.stroke();}
  for(let y=by;y<by+bh;y+=step){ctx.beginPath();ctx.moveTo(bx,y);ctx.lineTo(bx+bw,y);ctx.stroke();}

  // board edge
  ctx.beginPath();
  ctx.roundRect(bx,by,bw,bh,br);
  ctx.strokeStyle="rgba(0,180,80,0.35)";ctx.lineWidth=2;ctx.stroke();

  // mounting holes
  [[22,22],[BW-22,22],[22,BH-22],[BW-22,BH-22]].forEach(([mx,my])=>{
    const p=s(mx,my);
    ctx.beginPath();ctx.arc(p.x,p.y,4*scale,0,Math.PI*2);
    ctx.fillStyle="#050e07";ctx.fill();
    ctx.strokeStyle="rgba(180,130,20,.6)";ctx.lineWidth=1;ctx.stroke();
  });

  // board label
  ctx.save();
  ctx.fillStyle="rgba(200,255,200,0.18)";
  ctx.font=`${7*scale}px monospace`;
  ctx.textAlign="center";
  const lp=s(BW/2,BH-14);
  ctx.fillText("NOVA-1  CUSTOM SILICON  REV.A",lp.x,lp.y);
  ctx.restore();

  ctx.restore();
}

function drawTraces(){
  TRACES.forEach(tr=>{
    const pts=tr.pts;
    ctx.save();
    ctx.beginPath();
    const p0=s(pts[0].x,pts[0].y);
    ctx.moveTo(p0.x,p0.y);
    for(let i=1;i<pts.length;i++){const p=s(pts[i].x,pts[i].y);ctx.lineTo(p.x,p.y);}
    ctx.strokeStyle=tr.col+"88";
    ctx.lineWidth=(tr.w||1.2)*scale;
    ctx.lineCap="round";ctx.lineJoin="round";
    ctx.stroke();
    ctx.restore();
  });
}

function drawPulses(){
  pulses.forEach(p=>{
    const pos=getPulsePos(p);
    const sp=s(pos.x,pos.y);
    const col=p.trace.col;
    // glow
    ctx.save();
    const g=ctx.createRadialGradient(sp.x,sp.y,0,sp.x,sp.y,7*scale);
    g.addColorStop(0,"rgba(255,255,255,.95)");
    g.addColorStop(.3,col+"ee");
    g.addColorStop(1,col+"00");
    ctx.fillStyle=g;
    ctx.beginPath();ctx.arc(sp.x,sp.y,7*scale,0,Math.PI*2);ctx.fill();
    ctx.restore();
    // dot
    ctx.save();
    ctx.fillStyle="#fff";
    ctx.beginPath();ctx.arc(sp.x,sp.y,1.8*scale,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });
}

function drawVias(){
  VIAS.forEach(v=>{
    const p=s(v.x,v.y);
    ctx.beginPath();ctx.arc(p.x,p.y,2.8*scale,0,Math.PI*2);
    ctx.fillStyle="#b08020";ctx.fill();
    ctx.strokeStyle="#ffe080";ctx.lineWidth=.8*scale;ctx.stroke();
    ctx.beginPath();ctx.arc(p.x,p.y,1.1*scale,0,Math.PI*2);
    ctx.fillStyle="#050e07";ctx.fill();
  });
}

function drawPassives(){
  PASSIVES.forEach(p=>{
    const sc=s(p.x,p.y);
    const pw=5*scale,ph=3*scale;
    if(p.type==="cap"){
      // capacitor (two parallel lines)
      ctx.save();
      ctx.strokeStyle="#b08020";ctx.lineWidth=1.2*scale;
      ctx.beginPath();ctx.moveTo(sc.x-pw*.5,sc.y-ph*.8);ctx.lineTo(sc.x-pw*.5,sc.y+ph*.8);ctx.stroke();
      ctx.beginPath();ctx.moveTo(sc.x+pw*.5,sc.y-ph*.8);ctx.lineTo(sc.x+pw*.5,sc.y+ph*.8);ctx.stroke();
      ctx.strokeStyle="#b0802044";ctx.lineWidth=.8*scale;
      ctx.beginPath();ctx.moveTo(sc.x-pw*.5,sc.y);ctx.lineTo(sc.x+pw*.5,sc.y);ctx.stroke();
      ctx.restore();
    } else {
      // resistor (small rectangle)
      ctx.save();
      ctx.fillStyle="#222";
      ctx.strokeStyle="#b08020";ctx.lineWidth=.8*scale;
      ctx.fillRect(sc.x-pw*.6,sc.y-ph*.6,pw*1.2,ph*1.2);
      ctx.strokeRect(sc.x-pw*.6,sc.y-ph*.6,pw*1.2,ph*1.2);
      ctx.restore();
    }
  });
}

function drawChips(){
  CHIPS.forEach(c=>{
    const r=sr(c.x-c.w/2,c.y-c.h/2,c.w,c.h);
    const hovered=hoveredChip&&hoveredChip.id===c.id;
    const bc=TYPE_BORDER[c.t]||"#448888";

    ctx.save();

    // glow on hover
    if(hovered){
      ctx.shadowBlur=18*scale;
      ctx.shadowColor=bc;
    }

    // body
    ctx.fillStyle=TYPE_COL[c.t]||"#141414";
    ctx.strokeStyle=hovered?bc:bc+"99";
    ctx.lineWidth=(hovered?2:1.2)*scale;
    ctx.beginPath();ctx.roundRect(r.x,r.y,r.w,r.h,2*scale);
    ctx.fill();ctx.stroke();

    ctx.shadowBlur=0;

    // pin marks (small lines on edges)
    const pinStep=7*scale,pinLen=2.5*scale;
    // top/bottom pins
    for(let px=r.x+pinStep;px<r.x+r.w-pinStep*.5;px+=pinStep){
      ctx.fillStyle=bc+"99";
      ctx.fillRect(px-1,r.y-pinLen,2,pinLen);
      ctx.fillRect(px-1,r.y+r.h,2,pinLen);
    }
    // left/right pins
    for(let py=r.y+pinStep;py<r.y+r.h-pinStep*.5;py+=pinStep){
      ctx.fillRect(r.x-pinLen,py-1,pinLen,2);
      ctx.fillRect(r.x+r.w,py-1,pinLen,2);
    }

    // inner texture (dot matrix for BGA-like look on big chips)
    if(c.w>60){
      ctx.save();
      ctx.globalAlpha=.25;
      ctx.fillStyle=bc;
      const dotStep=8*scale;
      for(let dx=r.x+dotStep;dx<r.x+r.w-dotStep*.5;dx+=dotStep)
        for(let dy=r.y+dotStep;dy<r.y+r.h-dotStep*.5;dy+=dotStep){
          ctx.beginPath();ctx.arc(dx,dy,1.2*scale,0,Math.PI*2);ctx.fill();
        }
      ctx.restore();
    }

    // label
    ctx.save();
    ctx.fillStyle=hovered?"#fff":"rgba(200,255,200,0.75)";
    ctx.textAlign="center";ctx.textBaseline="middle";
    const lines=c.lbl.split("\n");
    const fs=Math.min((c.h*.28)*scale,(c.w*.22)*scale);
    ctx.font=`700 ${Math.max(fs,6)}px monospace`;
    const lh=(c.h*.32)*scale;
    lines.forEach((l,i)=>{
      const ly=s(c.x,c.y).y+(i-(lines.length-1)/2)*lh;
      ctx.fillText(l,s(c.x,c.y).x,ly);
    });
    ctx.restore();

    ctx.restore();
  });
}

/* ── LOOP ── */
function loop(t){
  requestAnimationFrame(loop);
  const dt=Math.min((t-(lastT||t))/1000,.05);
  lastT=t;frame++;

  ctx.clearRect(0,0,W,H);

  // ambient glow behind board
  const bc=s(BW/2,BH/2);
  const g=ctx.createRadialGradient(bc.x,bc.y,0,bc.x,bc.y,BW*.6*scale);
  g.addColorStop(0,"rgba(0,60,20,.25)");g.addColorStop(1,"rgba(0,0,0,0)");
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

  drawBoard();
  drawTraces();
  drawVias();
  drawPassives();
  drawChips();

  // update pulses
  pulses.forEach(p=>{
    p.progress=(p.progress+dt*(p.trace.sp||1)*.18/p.totalLen)%1;
  });
  drawPulses();
}

requestAnimationFrame(loop);
</script>
</body>
</html>
